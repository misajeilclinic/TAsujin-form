<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>자동차 보험 수진내역 확인대장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --primary:#1a3a5c; --accent:#2e7dc5; --light:#e8f2fb;
  --border:#b0c8e0; --text:#1a2b3c; --muted:#6b8299;
  --bg:#f4f8fc; --white:#fff; --green:#1e7a4a; --red:#c0392b;
}
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.header { background:var(--primary); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,.2); }
.header-left h1 { font-size:16px; font-weight:700; }
.header-left .year { font-size:12px; opacity:.65; }
.header-btns { display:flex; gap:8px; }
.hbtn { border:none; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:5px; }
.hbtn-list { background:rgba(255,255,255,.15); color:#fff; }
.hbtn-new  { background:#fff; color:var(--primary); }
.hbtn-save { background:var(--accent); color:#fff; }
.hbtn:active { opacity:.8; transform:scale(.97); }

/* CONTENT */
.content { padding:14px; max-width:960px; margin:0 auto; }

/* CARD */
.card { background:#fff; border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); border:1px solid var(--border); }
.card-title { font-size:11px; font-weight:700; color:var(--accent); letter-spacing:.8px; text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:1.5px solid var(--light); display:flex; justify-content:space-between; align-items:center; }

/* INFO GRID */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.field label { display:block; font-size:11px; color:var(--muted); font-weight:500; margin-bottom:4px; }
.field input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:15px; font-family:inherit; color:var(--text); background:var(--bg); transition:border-color .2s,background .2s; -webkit-appearance:none; }
.field input:focus { outline:none; border-color:var(--accent); background:#fff; }

/* SEARCH BAR */
.search-bar { display:flex; gap:8px; margin-bottom:14px; }
.search-bar input { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:11px 14px; font-size:15px; font-family:inherit; background:#fff; }
.search-bar input:focus { outline:none; border-color:var(--accent); }
.search-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; }
.search-btn:active { opacity:.85; }

/* PATIENT LIST MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:16px; width:90%; max-width:480px; max-height:75vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.25); }
.modal-header { padding:16px; background:var(--primary); color:#fff; display:flex; justify-content:space-between; align-items:center; }
.modal-header h2 { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; line-height:1; }
.modal-body { overflow-y:auto; padding:12px; }
.patient-item { padding:12px 14px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; cursor:pointer; transition:background .15s; display:flex; justify-content:space-between; align-items:center; }
.patient-item:hover { background:var(--light); }
.patient-item .pname { font-weight:700; font-size:15px; }
.patient-item .pchart { font-size:12px; color:var(--muted); margin-top:2px; }
.patient-item .pdate { font-size:11px; color:var(--muted); text-align:right; }
.patient-item .del-btn { background:var(--red); color:#fff; border:none; border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; margin-left:10px; flex-shrink:0; }
.empty-list { text-align:center; color:var(--muted); padding:32px; font-size:14px; }

/* TABLE */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; min-width:700px; }
thead tr:first-child th { background:var(--primary); color:#fff; padding:9px 5px; text-align:center; font-weight:600; font-size:12px; border:1px solid #2a4d6e; white-space:nowrap; }
.subheader th { background:#d0e4f5; color:var(--primary); font-size:11px; padding:6px 3px; border:1px solid var(--border); }
tbody tr:nth-child(odd) { background:var(--bg); }
tbody tr:nth-child(even) { background:#fff; }
tbody tr:hover { background:#ddeefa; }
tbody td { border:1px solid var(--border); padding:3px; text-align:center; vertical-align:middle; }

.date-cell input { width:100%; border:none; background:transparent; font-size:13px; font-family:inherit; text-align:center; padding:4px; color:var(--text); }
.date-cell input:focus { outline:1px solid var(--accent); border-radius:4px; }

.check-cell { cursor:pointer; user-select:none; }
.check-cell .cb { width:30px; height:30px; border:2px solid var(--border); border-radius:6px; margin:0 auto; display:flex; align-items:center; justify-content:center; transition:all .15s; font-size:17px; background:#fff; }
.check-cell.checked .cb { background:var(--green); border-color:var(--green); color:#fff; }

/* SIGNATURE CELL — tap to expand */
.sig-cell { min-width:80px; }
.sig-thumb { border:1.5px dashed var(--border); border-radius:6px; height:44px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px; overflow:hidden; position:relative; }
.sig-thumb canvas { position:absolute; inset:0; width:100%; height:100%; }
.sig-thumb .sig-hint { position:relative; z-index:1; pointer-events:none; }
.sig-thumb.has-sig .sig-hint { display:none; }

.notes-cell input { width:100%; border:none; background:transparent; font-size:12px; font-family:inherit; padding:4px; color:var(--text); }
.notes-cell input:focus { outline:1px solid var(--accent); border-radius:4px; }

.add-row-btn { width:100%; margin-top:10px; padding:11px; background:#fff; border:2px dashed var(--border); border-radius:10px; color:var(--muted); font-size:14px; font-family:inherit; cursor:pointer; transition:all .2s; }
.add-row-btn:hover { background:var(--light); border-color:var(--accent); color:var(--accent); }

/* SIGNATURE MODAL */
.sig-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600; align-items:center; justify-content:center; }
.sig-modal-bg.open { display:flex; }
.sig-modal { background:#fff; border-radius:16px; width:92%; max-width:520px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.3); }
.sig-modal-header { background:var(--primary); color:#fff; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
.sig-modal-header h3 { font-size:15px; font-weight:700; }
.sig-modal-body { padding:16px; }
.sig-modal-body p { font-size:12px; color:var(--muted); margin-bottom:10px; }
#sigPadWrap { border:2px solid var(--border); border-radius:10px; background:#fafeff; overflow:hidden; touch-action:none; }
#sigPad { display:block; width:100%; cursor:crosshair; }
.sig-modal-footer { display:flex; gap:10px; padding:0 16px 16px; }
.sig-btn { flex:1; padding:13px; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; }
.sig-btn-clear { background:var(--bg); color:var(--muted); border:1.5px solid var(--border); }
.sig-btn-ok { background:var(--green); color:#fff; }

/* STATUS BAR */
.status { font-size:12px; color:var(--muted); padding:4px 0 8px; display:flex; align-items:center; gap:6px; }
.status .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
.status.saved .dot { background:var(--green); }
.status.saving .dot { background:var(--accent); animation:pulse .8s infinite; }
.status.error .dot { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* TOAST */
#toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a3a5c; color:#fff; padding:11px 22px; border-radius:30px; font-size:13px; font-weight:500; opacity:0; transition:all .3s; z-index:9999; white-space:nowrap; pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:500px) { .info-grid { grid-template-columns:1fr; } .header-btns .hbtn span { display:none; } }
@media print { .header,.search-bar,.add-row-btn,.sig-modal-bg,.modal-bg,#toast,.hbtn-list,.hbtn-new { display:none!important; } body { background:#fff; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="year">2026년</div>
    <h1>자동차 보험 수진내역 확인대장</h1>
  </div>
  <div class="header-btns">
    <button class="hbtn hbtn-list" onclick="openList()">📋 <span>환자 목록</span></button>
    <button class="hbtn hbtn-new"  onclick="newPatient()">➕ <span>신규</span></button>
    <button class="hbtn hbtn-save" onclick="saveData()">💾 <span>저장</span></button>
  </div>
</div>

<div class="content">

  <!-- 검색 -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="차트번호로 검색..." inputmode="numeric">
    <button class="search-btn" onclick="searchPatient()">검색</button>
  </div>
  <div class="status" id="statusBar"><div class="dot"></div><span id="statusMsg">새 환자를 입력하거나 차트번호로 검색하세요</span></div>

  <!-- 환자 기본정보 -->
  <div class="card">
    <div class="card-title">📋 환자 기본정보</div>
    <div class="info-grid">
      <div class="field"><label>차트번호</label><input type="text" id="chartNo" placeholder="차트번호" inputmode="numeric"></div>
      <div class="field"><label>환자성명</label><input type="text" id="patientName" placeholder="성명"></div>
      <div class="field"><label>자동차보험 회사명</label><input type="text" id="insCompany" placeholder="보험사명"></div>
      <div class="field"><label>사고일자</label><input type="date" id="accidentDate"></div>
    </div>
  </div>

  <!-- 수진내역 -->
  <div class="card">
    <div class="card-title">
      <span>📝 수진내역 (진료내용 설명을 듣고 치료받음을 확인함)</span>
    </div>
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th rowspan="2" style="min-width:88px">치료일자</th>
            <th colspan="7">시술내용</th>
            <th rowspan="2" style="min-width:76px">환자서명</th>
            <th rowspan="2" style="min-width:72px">기타</th>
          </tr>
          <tr class="subheader">
            <th>침<br>(전침)</th><th>부항<br>(습2,습)</th><th>ICT</th>
            <th>찜질/<br>IR</th><th>약침</th><th>기기구<br>(뜸)</th><th>추나</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <button class="add-row-btn" onclick="addRow()">＋ 행 추가</button>
  </div>

</div>

<!-- 환자 목록 모달 -->
<div class="modal-bg" id="listModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 저장된 환자 목록</h2>
      <button class="modal-close" onclick="closeList()">✕</button>
    </div>
    <div class="modal-body" id="listBody">
      <div class="empty-list">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 서명 모달 -->
<div class="sig-modal-bg" id="sigModal">
  <div class="sig-modal">
    <div class="sig-modal-header">
      <h3>✍️ 환자 서명</h3>
      <button class="modal-close" onclick="closeSigModal()">✕</button>
    </div>
    <div class="sig-modal-body">
      <p>아래 박스에 손가락이나 펜으로 서명해주세요</p>
      <div id="sigPadWrap"><canvas id="sigPad" height="200"></canvas></div>
    </div>
    <div class="sig-modal-footer">
      <button class="sig-btn sig-btn-clear" onclick="clearSigPad()">다시 서명</button>
      <button class="sig-btn sig-btn-ok"    onclick="confirmSig()">확인</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwmW9gCLVBcyobf7z2NEjiuDuyShYKo-YmZ5manj8v5Fa75fEYddemD9bFv8xnAqVdh/exec';

let rowCount = 0;
let currentSigRowId = null;
let sigDrawing = false;
let sigLastX = 0, sigLastY = 0;

/* ── GAS 통신 (fetch) ── */
function gasCall(params) {
  return new Promise((resolve, reject) => {
    const qs = Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
    const url = `${GAS_URL}?${qs}`;
    fetch(url, { redirect: 'follow' })
      .then(r => r.json())
      .then(resolve)
      .catch(reject);
    setTimeout(() => reject(new Error('시간 초과')), 20000);
  });
}

/* ── STATUS ── */
function setStatus(state, msg) {
  const bar = document.getElementById('statusBar');
  const txt = document.getElementById('statusMsg');
  bar.className = 'status ' + state;
  txt.textContent = msg;
}

/* ── TOAST ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── ROW 추가 ── */
function addRow(data) {
  rowCount++;
  const rid = rowCount;
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.dataset.rid = rid;

  const checks = data?.checks || [false,false,false,false,false,false,false];
  const sigData = data?.sig || '';
  const notes   = data?.notes || '';
  const date    = data?.date || '';

  let html = `<td class="date-cell"><input type="date" value="${date}"></td>`;
  checks.forEach((c,i) => {
    html += `<td class="check-cell${c?' checked':''}" onclick="toggleCheck(this)"><div class="cb">${c?'✓':''}</div></td>`;
  });
  html += `
    <td class="sig-cell">
      <div class="sig-thumb${sigData?' has-sig':''}" onclick="openSigModal(${rid})" data-rid="${rid}">
        <canvas width="80" height="44" data-rid="${rid}"></canvas>
        <span class="sig-hint">탭하여<br>서명</span>
      </div>
    </td>
    <td class="notes-cell"><input type="text" placeholder="비고" value="${notes}"></td>
  `;
  tr.innerHTML = html;
  tbody.appendChild(tr);

  if (sigData) {
    setTimeout(() => drawSigFromData(rid, sigData), 50);
  }
  return rid;
}

/* ── 체크 토글 ── */
function toggleCheck(cell) {
  cell.classList.toggle('checked');
  cell.querySelector('.cb').textContent = cell.classList.contains('checked') ? '✓' : '';
}

/* ── 서명 모달 ── */
const sigCtxMap = {};

function openSigModal(rid) {
  currentSigRowId = rid;
  const modal = document.getElementById('sigModal');
  modal.classList.add('open');

  const pad = document.getElementById('sigPad');
  pad.width = pad.parentElement.offsetWidth;
  const ctx = pad.getContext('2d');
  ctx.clearRect(0, 0, pad.width, pad.height);

  // 기존 서명 복사
  const thumb = document.querySelector(`.sig-thumb[data-rid="${rid}"] canvas`);
  if (thumb && thumb.dataset.hasData === '1') {
    ctx.drawImage(thumb, 0, 0, pad.width, pad.height);
  }

  sigDrawing = false;
  pad.onmousedown = sigStart; pad.onmousemove = sigMove; pad.onmouseup = sigEnd;
  pad.ontouchstart = sigStart; pad.ontouchmove = sigMove; pad.ontouchend = sigEnd;
}

function closeSigModal() {
  document.getElementById('sigModal').classList.remove('open');
  currentSigRowId = null;
}

function sigPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}
function sigStart(e) {
  e.preventDefault(); sigDrawing = true;
  const pad = document.getElementById('sigPad');
  [sigLastX, sigLastY] = sigPos(e, pad);
}
function sigMove(e) {
  if (!sigDrawing) return; e.preventDefault();
  const pad = document.getElementById('sigPad');
  const ctx = pad.getContext('2d');
  const [x,y] = sigPos(e, pad);
  ctx.beginPath(); ctx.moveTo(sigLastX, sigLastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = '#1a3a5c'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.stroke();
  sigLastX = x; sigLastY = y;
}
function sigEnd(e) { sigDrawing = false; }

function clearSigPad() {
  const pad = document.getElementById('sigPad');
  pad.getContext('2d').clearRect(0, 0, pad.width, pad.height);
}

function confirmSig() {
  const rid = currentSigRowId;
  const pad = document.getElementById('sigPad');
  const dataUrl = pad.toDataURL();

  const thumb = document.querySelector(`.sig-thumb[data-rid="${rid}"]`);
  const canvas = thumb.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  img.src = dataUrl;
  canvas.dataset.hasData = '1';
  canvas.dataset.dataUrl = dataUrl;
  thumb.classList.add('has-sig');

  closeSigModal();
  toast('서명이 저장되었습니다');
}

function drawSigFromData(rid, dataUrl) {
  const canvas = document.querySelector(`.sig-thumb[data-rid="${rid}"] canvas`);
  if (!canvas) return;
  canvas.dataset.hasData = '1';
  canvas.dataset.dataUrl = dataUrl;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  img.src = dataUrl;
  const thumb = canvas.closest('.sig-thumb');
  if (thumb) thumb.classList.add('has-sig');
}

/* ── 데이터 수집 ── */
function collectData() {
  const rows = [];
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    const rid = tr.dataset.rid;
    const checks = [...tr.querySelectorAll('.check-cell')].map(c => c.classList.contains('checked'));
    const sigCanvas = tr.querySelector('.sig-thumb canvas');
    const sig = sigCanvas?.dataset?.dataUrl || '';
    const date = tr.querySelector('.date-cell input')?.value || '';
    const notes = tr.querySelector('.notes-cell input')?.value || '';
    rows.push({ date, checks, sig, notes });
  });
  return {
    chartNo:      document.getElementById('chartNo').value.trim(),
    patientName:  document.getElementById('patientName').value.trim(),
    insCompany:   document.getElementById('insCompany').value.trim(),
    accidentDate: document.getElementById('accidentDate').value,
    rows
  };
}

/* ── 저장 ── */
async function saveData() {
  const data = collectData();
  if (!data.chartNo) { toast('⚠️ 차트번호를 입력해주세요'); return; }
  setStatus('saving', '저장 중...');
  try {
    const res = await gasCall({ action:'save', data: JSON.stringify(data) });
    if (res.status === 'ok') {
      setStatus('saved', `저장 완료 — ${data.patientName || '환자'} (차트 ${data.chartNo})`);
      toast('✅ 저장되었습니다');
    } else {
      throw new Error(res.message);
    }
  } catch(e) {
    setStatus('error', '저장 실패: ' + e.message);
    toast('❌ 저장 실패: ' + e.message);
  }
}

/* ── 검색 ── */
async function searchPatient() {
  const chartNo = document.getElementById('searchInput').value.trim();
  if (!chartNo) { toast('차트번호를 입력해주세요'); return; }
  setStatus('saving', '검색 중...');
  try {
    const res = await gasCall({ action:'load', chartNo });
    if (res.status === 'ok') {
      loadForm(res.data);
      setStatus('saved', `불러옴 — ${res.data.patientName} (차트 ${res.data.chartNo}) · 최종수정: ${res.data.lastUpdated}`);
      toast(`✅ ${res.data.patientName} 님 데이터를 불러왔습니다`);
    } else {
      setStatus('', '검색 결과 없음');
      toast('❌ 해당 차트번호가 없습니다');
    }
  } catch(e) {
    setStatus('error', '검색 실패: ' + e.message);
    toast('❌ 오류: ' + e.message);
  }
}

/* ── 폼 로드 ── */
function loadForm(data) {
  document.getElementById('chartNo').value      = data.chartNo || '';
  document.getElementById('patientName').value  = data.patientName || '';
  document.getElementById('insCompany').value   = data.insCompany || '';
  document.getElementById('accidentDate').value = data.accidentDate || '';
  document.getElementById('tableBody').innerHTML = '';
  rowCount = 0;
  (data.rows || []).forEach(r => addRow(r));
  while (rowCount < 15) addRow();
}

/* ── 신규 ── */
function newPatient() {
  if (!confirm('현재 내용을 지우고 새 환자를 입력하시겠습니까?')) return;
  ['chartNo','patientName','insCompany','accidentDate'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('searchInput').value = '';
  document.getElementById('tableBody').innerHTML = '';
  rowCount = 0;
  for (let i = 0; i < 15; i++) addRow();
  setStatus('', '새 환자 입력 준비');
}

/* ── 환자 목록 ── */
async function openList() {
  document.getElementById('listModal').classList.add('open');
  document.getElementById('listBody').innerHTML = '<div class="empty-list">불러오는 중...</div>';
  try {
    const res = await gasCall({ action:'list' });
    if (res.status === 'ok' && res.list.length > 0) {
      document.getElementById('listBody').innerHTML = res.list.map(p => `
        <div class="patient-item" onclick="loadPatient('${p.chartNo}')">
          <div>
            <div class="pname">${p.patientName || '(이름 없음)'}</div>
            <div class="pchart">차트번호: ${p.chartNo}</div>
          </div>
          <div style="display:flex;align-items:center">
            <div class="pdate">${p.lastUpdated || ''}</div>
            <button class="del-btn" onclick="event.stopPropagation();deletePatient('${p.chartNo}','${p.patientName}')">삭제</button>
          </div>
        </div>
      `).join('');
    } else {
      document.getElementById('listBody').innerHTML = '<div class="empty-list">저장된 환자가 없습니다</div>';
    }
  } catch(e) {
    document.getElementById('listBody').innerHTML = `<div class="empty-list">오류: ${e.message}</div>`;
  }
}

function closeList() { document.getElementById('listModal').classList.remove('open'); }

async function loadPatient(chartNo) {
  closeList();
  document.getElementById('searchInput').value = chartNo;
  await searchPatient();
}

async function deletePatient(chartNo, name) {
  if (!confirm(`${name || chartNo} 님의 데이터를 삭제하시겠습니까?`)) return;
  try {
    await gasCall({ action:'delete', chartNo });
    toast('삭제되었습니다');
    openList();
  } catch(e) { toast('삭제 실패: ' + e.message); }
}

/* ── Enter 검색 ── */
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchPatient(); });

/* ── 초기 15행 ── */
for (let i = 0; i < 15; i++) addRow();
</script>
</body>
</html>
